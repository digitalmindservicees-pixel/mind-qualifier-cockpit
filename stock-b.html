<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Réserve · Design B (Clean SaaS)</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#f7f8fa; --card:#ffffff; --ink:#111827; --ink2:#6b7280; --faint:#9ca3af;
    --line:#eef0f3; --accent:#6366f1; --accent-soft:#eef0fe;
    --rupture:#ef4444; --bas:#f59e0b; --ok:#10b981; --track:#eef0f3;
  }
  *{box-sizing:border-box}
  html,body{margin:0}
  body{background:var(--bg);color:var(--ink);font-family:'Inter',system-ui,sans-serif;font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased}
  .wrap{max-width:940px;margin:0 auto;padding:28px 18px 64px}
  .banner{background:var(--accent-soft);color:#4338ca;border-radius:10px;padding:9px 14px;font-size:12.5px;margin-bottom:22px;font-weight:500}
  .top{display:flex;align-items:center;gap:14px;margin-bottom:26px}
  .mark{width:46px;height:46px;border-radius:12px;background:var(--accent);color:#fff;display:flex;align-items:center;justify-content:center;font-size:22px;flex:none;box-shadow:0 4px 12px rgba(99,102,241,.25)}
  h1{font-weight:800;font-size:22px;letter-spacing:-.02em;margin:0}
  .top p{margin:2px 0 0;color:var(--ink2);font-size:12.5px}
  .live{margin-left:auto;display:inline-flex;align-items:center;gap:8px;font-size:12px;color:var(--ink2);font-weight:600;background:var(--card);border:1px solid var(--line);padding:8px 13px;border-radius:20px;box-shadow:0 1px 2px rgba(0,0,0,.03)}
  .dot{width:8px;height:8px;border-radius:50%;background:var(--ok)}
  .ledger{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:8px}
  .lg{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:18px 20px;box-shadow:0 1px 3px rgba(16,24,40,.04)}
  .lg .k{font-size:11.5px;color:var(--ink2);font-weight:600}
  .lg .v{font-weight:800;font-size:29px;margin-top:8px;letter-spacing:-.02em}
  .lg .u{font-size:11.5px;color:var(--faint);margin-top:3px}
  .lg.rupt .v{color:var(--rupture)} .lg.bas .v{color:var(--bas)} .lg:first-child .v{color:var(--accent)}
  @media(max-width:720px){.ledger{grid-template-columns:1fr 1fr}}
  .sec{font-size:12px;letter-spacing:.02em;text-transform:uppercase;color:var(--ink2);font-weight:700;margin:32px 3px 14px;display:flex;align-items:center;gap:9px}
  .sec .n{margin-left:auto;color:var(--faint);font-weight:600;text-transform:none;letter-spacing:0}
  .tickets{display:flex;flex-direction:column;gap:12px}
  .ticket{display:grid;grid-template-columns:1fr 220px 100px;gap:18px;align-items:center;background:var(--card);border:1px solid var(--line);border-radius:16px;padding:16px 20px;box-shadow:0 1px 3px rgba(16,24,40,.04);position:relative}
  .ticket:before{content:"";position:absolute;left:0;top:14px;bottom:14px;width:4px;border-radius:4px}
  .ticket.rupture:before{background:var(--rupture)} .ticket.bas:before{background:var(--bas)}
  .tk-name{font-weight:700;font-size:15.5px;display:flex;align-items:baseline;gap:8px;flex-wrap:wrap}
  .tk-cat{font-size:10.5px;font-weight:600;color:var(--ink2);background:var(--bg);border:1px solid var(--line);padding:2px 8px;border-radius:20px}
  .tk-sub{font-size:11.5px;color:var(--faint);margin-top:4px}
  .tk-read{text-align:right}
  .tk-read b{font-size:22px;font-weight:800} .tk-read span{font-size:12px;color:var(--faint)}
  .tk-read em{display:block;font-style:normal;font-size:10px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;margin-top:4px}
  .ticket.rupture .tk-read b,.ticket.rupture .tk-read em{color:var(--rupture)}
  .ticket.bas .tk-read b,.ticket.bas .tk-read em{color:var(--bas)}
  @media(max-width:720px){.ticket{grid-template-columns:1fr 90px}.tk-gauge{grid-column:1/-1;order:3}}
  .track{position:relative;height:8px;background:var(--track);border-radius:6px;overflow:hidden}
  .fill{position:absolute;left:0;top:0;bottom:0;border-radius:6px;width:0;transition:width .7s cubic-bezier(.4,0,.2,1)}
  .fill.ok{background:var(--ok)} .fill.bas{background:var(--bas)} .fill.rupture{background:var(--rupture)}
  .tick{position:absolute;top:-3px;bottom:-3px;width:2px;background:var(--ink);opacity:.2}
  .glabel{display:flex;justify-content:space-between;font-size:10px;color:var(--faint);margin-top:6px;font-weight:500}
  .okstate{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:36px 18px;text-align:center;color:var(--ink2);box-shadow:0 1px 3px rgba(16,24,40,.04)}
  .okstate .big{font-size:32px;margin-bottom:8px;color:var(--ok)}
  .invbar{margin:0 1px 14px}
  .search{position:relative}
  .search svg{position:absolute;left:14px;top:50%;transform:translateY(-50%);width:16px;height:16px;stroke:var(--faint)}
  .search input{width:100%;padding:12px 14px 12px 40px;border:1px solid var(--line);border-radius:12px;background:var(--card);color:var(--ink);font:inherit;font-size:13.5px;outline:none;box-shadow:0 1px 2px rgba(0,0,0,.03)}
  .search input:focus{border-color:var(--accent);box-shadow:0 0 0 4px var(--accent-soft)}
  .cpills{display:flex;gap:8px;flex-wrap:wrap;margin:0 1px 16px}
  .cpill{cursor:pointer;border:1px solid var(--line);background:var(--card);color:var(--ink2);font:inherit;font-size:12px;font-weight:600;padding:8px 14px;border-radius:20px;transition:.18s}
  .cpill:hover{color:var(--ink);border-color:var(--ink2)}
  .cpill.on{color:#fff;border-color:transparent;background:var(--accent)}
  .cpill .c{opacity:.6;margin-left:5px;font-size:10.5px}
  .inv{background:var(--card);border:1px solid var(--line);border-radius:16px;overflow:hidden;box-shadow:0 1px 3px rgba(16,24,40,.04)}
  .irow{display:grid;grid-template-columns:1fr 200px 84px;gap:16px;align-items:center;padding:14px 20px;border-top:1px solid var(--line)}
  .irow:first-child{border-top:none}
  .iv-name{font-weight:600;font-size:13.5px;display:flex;align-items:baseline;gap:8px;flex-wrap:wrap}
  .iv-cat{font-size:10px;font-weight:600;color:var(--ink2);background:var(--bg);border:1px solid var(--line);padding:1px 8px;border-radius:20px}
  .iv-loc{font-size:11px;color:var(--faint);margin-top:3px}
  .iv-read{text-align:right;font-weight:700;font-size:14px}
  .iv-read span{font-size:10.5px;color:var(--faint);font-weight:400}
  .iv-read.rupture{color:var(--rupture)} .iv-read.bas{color:var(--bas)} .iv-read.ok{color:var(--ink)}
  @media(max-width:720px){.irow{grid-template-columns:1fr 74px}.iv-gauge{grid-column:1/-1;order:3}}
  .noresult{padding:32px;text-align:center;color:var(--ink2)}
</style>
</head>
<body>
<div class="wrap">
  <div class="banner">Aperçu design <b>B — Clean SaaS clair</b> · données de démonstration</div>
  <header class="top">
    <div class="mark">📦</div>
    <div><h1>Réserve</h1><p>Stock de l'atelier · Digital Mind</p></div>
    <div class="live"><span class="dot"></span><span>en direct</span></div>
  </header>
  <div class="ledger">
    <div class="lg"><div class="k">Valeur en réserve</div><div class="v" id="kVal">—</div><div class="u">FCFA · stock × prix d'achat</div></div>
    <div class="lg"><div class="k">Références</div><div class="v" id="kRefs">—</div><div class="u">articles</div></div>
    <div class="lg rupt"><div class="k">En rupture</div><div class="v" id="kRupt">—</div><div class="u">stock épuisé</div></div>
    <div class="lg bas"><div class="k">Sous le seuil</div><div class="v" id="kBas">—</div><div class="u">à recommander</div></div>
  </div>
  <div class="sec">À commander <span class="n" id="alCount"></span></div>
  <div id="tickets"></div>
  <div class="sec">Inventaire <span class="n" id="invCount"></span></div>
  <div class="invbar"><label class="search"><svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <input id="q" type="text" placeholder="Chercher un article, un emplacement, un fournisseur…" autocomplete="off"></label></div>
  <div class="cpills" id="cpills"></div>
  <div class="inv" id="inv"></div>
</div>
<script>
  
    var ITEMS = [
      {article:"Coffret Port Carte de Visite", cat:"Goodies Premium", stock:0, seuil:0, prix:12000, unite:"pcs", emplacement:"Magasin", fournisseur:"Fournisseur chine"},
      {article:"Casquette brodée logo", cat:"Textile Casquette", stock:3, seuil:10, prix:3500, unite:"pcs", emplacement:"Étagère B2", fournisseur:"Atelier Dakar"},
      {article:"Polo piqué M", cat:"Textile Polo", stock:8, seuil:12, prix:6000, unite:"pcs", emplacement:"Étagère C1", fournisseur:"Atelier Dakar"},
      {article:"Agenda 2026", cat:"Agenda", stock:24, seuil:15, prix:4500, unite:"pcs", emplacement:"Réserve", fournisseur:"Imprimerie Ndiaye"},
      {article:"Clé USB 32Go", cat:"Accessoires Informatique", stock:40, seuil:20, prix:5000, unite:"pcs", emplacement:"Tiroir A", fournisseur:"TechImport"},
      {article:"Souris sans fil", cat:"Accessoires Informatique", stock:15, seuil:8, prix:8000, unite:"pcs", emplacement:"Tiroir A", fournisseur:"TechImport"},
      {article:"Tapis de souris", cat:"Accessoires Informatique", stock:60, seuil:25, prix:2000, unite:"pcs", emplacement:"Étagère D", fournisseur:"TechImport"},
      {article:"Mug céramique", cat:"Goodies Premium", stock:18, seuil:20, prix:3000, unite:"pcs", emplacement:"Étagère B1", fournisseur:"Fournisseur chine"},
      {article:"Stylo métal gravé", cat:"Goodies Premium", stock:120, seuil:50, prix:1500, unite:"pcs", emplacement:"Tiroir C", fournisseur:"Fournisseur chine"},
      {article:"T-shirt coton L", cat:"Textile Polo", stock:5, seuil:10, prix:4000, unite:"pcs", emplacement:"Étagère C2", fournisseur:"Atelier Dakar"}
    ];
  var $=function(s){return document.querySelector(s);};
  var CAT="all";
  var fmt=function(n){return n==null?"—":Number(n).toLocaleString('fr-FR');};
  var esc=function(s){return String(s==null?"":s).replace(/[&<>"]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];});};
  function statusOf(it){ if(it.stock<=0) return "rupture"; if(it.seuil>0&&it.stock<=it.seuil) return "bas"; return "ok"; }
  function gaugeHTML(it){ var s=statusOf(it),pct,tick=""; if(it.seuil>0){var ref=it.seuil*2;pct=Math.max(0,Math.min(100,(it.stock/ref)*100));tick='<span class="tick" style="left:50%"></span>';}else{pct=it.stock>0?100:0;}
    return '<div class="gauge"><div class="track"><div class="fill '+s+'" data-w="'+pct.toFixed(1)+'"></div>'+tick+'</div><div class="glabel"><span>'+fmt(it.stock)+' '+esc(it.unite)+'</span>'+(it.seuil>0?'<span>seuil '+fmt(it.seuil)+'</span>':'<span></span>')+'</div></div>'; }
  function animateFills(){document.querySelectorAll('.fill[data-w]').forEach(function(el){requestAnimationFrame(function(){el.style.width=el.getAttribute('data-w')+'%';});});}
  function render(){
    var valeur=0,rupt=0,bas=0;
    ITEMS.forEach(function(it){if(it.stock>0)valeur+=it.stock*it.prix;var s=statusOf(it);if(s==="rupture")rupt++;else if(s==="bas")bas++;});
    $("#kVal").textContent=fmt(Math.round(valeur));$("#kRefs").textContent=fmt(ITEMS.length);$("#kRupt").textContent=fmt(rupt);$("#kBas").textContent=fmt(bas);
    var al=ITEMS.filter(function(it){return statusOf(it)!=="ok";}).sort(function(a,b){var sa=statusOf(a),sb=statusOf(b);if(sa!==sb)return sa==="rupture"?-1:1;return (a.stock-a.seuil)-(b.stock-b.seuil);});
    $("#alCount").textContent=al.length?al.length+(al.length>1?' articles':' article'):'';
    var tk=$("#tickets");
    if(!al.length){tk.innerHTML='<div class="okstate"><div class="big">✓</div><b>Réserve saine.</b><br>Rien à commander.</div>';}
    else{var h='<div class="tickets">';al.forEach(function(it){var s=statusOf(it);var sub=[it.emplacement,it.fournisseur?'Fourn. '+it.fournisseur:''].filter(Boolean).join(' · ');
      h+='<div class="ticket '+s+'"><div><div class="tk-name">'+esc(it.article)+'<span class="tk-cat">'+esc(it.cat)+'</span></div>'+(sub?'<div class="tk-sub">'+esc(sub)+'</div>':'')+'</div><div class="tk-gauge">'+gaugeHTML(it)+'</div><div class="tk-read"><b>'+fmt(it.stock)+'</b><span> / '+fmt(it.seuil)+'</span><em>'+(s==="rupture"?'rupture':'sous seuil')+'</em></div></div>';});tk.innerHTML=h+'</div>';}
    renderPills();renderInv();animateFills();
  }
  function renderPills(){var counts={};ITEMS.forEach(function(it){counts[it.cat]=(counts[it.cat]||0)+1;});var cats=Object.keys(counts).sort();
    var h='<button class="cpill '+(CAT==="all"?"on":"")+'" data-c="all">Tous <span class="c">'+ITEMS.length+'</span></button>';
    cats.forEach(function(c){h+='<button class="cpill '+(CAT===c?"on":"")+'" data-c="'+esc(c)+'">'+esc(c)+' <span class="c">'+counts[c]+'</span></button>';});
    var box=$("#cpills");box.innerHTML=h;if(!box.__w){box.__w=1;box.addEventListener('click',function(e){var b=e.target.closest('.cpill');if(!b)return;CAT=b.getAttribute('data-c');render();});}}
  function renderInv(){var q=($("#q").value||"").trim().toLowerCase();
    var arr=ITEMS.filter(function(it){var okC=CAT==="all"||it.cat===CAT;var hay=(it.article+' '+it.cat+' '+it.emplacement+' '+it.fournisseur).toLowerCase();return okC&&(!q||hay.indexOf(q)>=0);});
    arr.sort(function(a,b){var ra=statusOf(a)==="ok"?1:0,rb=statusOf(b)==="ok"?1:0;if(ra!==rb)return ra-rb;return (a.cat+a.article).localeCompare(b.cat+b.article,'fr');});
    $("#invCount").textContent=arr.length+(arr.length>1?' articles':' article');var box=$("#inv");
    if(!arr.length){box.innerHTML='<div class="noresult">Aucun article ne correspond.</div>';return;}
    var h='';arr.forEach(function(it){var s=statusOf(it);var loc=[it.emplacement,it.fournisseur].filter(Boolean).join(' · ');
      h+='<div class="irow"><div><div class="iv-name">'+esc(it.article)+'<span class="iv-cat">'+esc(it.cat)+'</span></div>'+(loc?'<div class="iv-loc">'+esc(loc)+'</div>':'')+'</div><div class="iv-gauge">'+gaugeHTML(it)+'</div><div class="iv-read '+s+'">'+fmt(it.stock)+'<span>'+(it.seuil?'/'+fmt(it.seuil):'')+'</span></div></div>';});
    box.innerHTML=h;animateFills();}
  $("#q").addEventListener('input',renderInv);
  render();
</script>
</body>
</html>
